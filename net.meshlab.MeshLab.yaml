app-id: net.meshlab.MeshLab
runtime: org.kde.Platform
sdk: org.kde.Sdk
runtime-version: 5.15-25.08
command: meshlab
rename-desktop-file: meshlab.desktop
rename-icon: meshlab
finish-args:
  # Disable wayland for now, until new GLEW version is release.
  #- --socket=wayland
  #- --socket=fallback-x11
  - --socket=x11
  - --share=ipc
  - --device=dri
  - --filesystem=/tmp
  - --filesystem=host #https://github.com/cnr-isti-vclab/meshlab/issues/1103
  - --filesystem=/run/media
  - --filesystem=/media
  - --filesystem=xdg-run/gvfs # allow GVfs mounts
cleanup:
  - /include
  - /lib/cmake
  - /lib/pkgconfig
  - /share/aclocal
  - /share/doc
  - /share/info
  - /share/man
  - '*.la'
  - '*.a'

modules:
  # On aarch64 the KDE SDK Qt uses GLES3, which has no GL 1.x fixed-function
  # pipeline. gl4es provides a GL 1.x/2.x → GLES3 translation layer so that
  # vcglib's immediate-mode trackball code compiles and runs correctly.
  # It must be listed before GLEW so GLEW links against gl4es's libGL.so.1.
  - name: gl4es
    only-arches:
      - aarch64
    buildsystem: simple
    build-commands:
      - cmake -B _build -DCMAKE_BUILD_TYPE=Release -DDEFAULT_ES=2 -DCMAKE_POLICY_VERSION_MINIMUM=3.5
      - cmake --build _build --parallel $FLATPAK_BUILDER_N_JOBS
      - install -Dm755 lib/libGL.so.1 ${FLATPAK_DEST}/lib/libGL.so.1
      - ln -sf libGL.so.1 ${FLATPAK_DEST}/lib/libGL.so
      - install -d ${FLATPAK_DEST}/include/GL
      - install -m644 include/GL/gl.h include/GL/glext.h ${FLATPAK_DEST}/include/GL/
    sources:
      - type: git
        url: https://github.com/ptitSeb/gl4es.git
        tag: v1.1.6
        commit: c9895df34cd466c23bc60c2bd3db3d87e98fcbe7
        x-checker-data:
          type: git
          tag-pattern: ^(v[\d.]+)$

  - shared-modules/glew/glew.json
  - shared-modules/glu/glu-9.json

  # On aarch64 the KDE SDK's Qt is GLES-enabled. Its GLES3/gl32.h defines
  # PFNGLOBJECTPTRLABELPROC and PFNGLGETOBJECTPTRLABELPROC with `const void*`,
  # while GLEW 2.3.1 defines them with `void*`. Because these are typedefs (not
  # function prototypes), GL_GLES_PROTOTYPES=0 does not suppress them and the
  # compiler rejects the redefinition. Patch the installed header to match.
  - name: glew-fix-aarch64-const-ptr
    only-arches:
      - aarch64
    buildsystem: simple
    build-commands:
      - sed -i 's/PFNGLGETOBJECTPTRLABELPROC) (void\*/PFNGLGETOBJECTPTRLABELPROC) (const void*/g' /app/include/GL/glew.h
      - sed -i 's/PFNGLOBJECTPTRLABELPROC) (void\*/PFNGLOBJECTPTRLABELPROC) (const void*/g' /app/include/GL/glew.h
    sources:
      - type: inline
        dest-filename: placeholder
        contents: ""

  - name: Boost
    buildsystem: simple
    build-commands:
      - ./bootstrap.sh --prefix=/app --with-libraries=filesystem,regex
      - ./b2 install link=static runtime-link=static cxxflags="-fPIC" -j $FLATPAK_BUILDER_N_JOBS
    sources:
      - type: archive
        url: https://archives.boost.io/release/1.91.0/source/boost_1_91_0.tar.bz2
        sha256: de5e6b0e4913395c6bdfa90537febd9028ea4c0735d2cdb0cd9b45d5f51264f5
        x-checker-data:
          type: anitya
          project-id: 6845
          stable-only: true
          url-template: https://archives.boost.io/release/$version/source/boost_${major}_${minor}_${patch}.tar.bz2

  - name: CGAL
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DCGAL_HEADER_ONLY=ON
    cleanup:
      - /bin
    sources:
      - type: archive
        url: https://github.com/CGAL/cgal/releases/download/v6.1.1/CGAL-6.1.1.tar.xz
        sha256: 52506935f70e247ed2777e3c65f20e86f79208c2a2d0e180ae7475daf11c96ef
        x-checker-data:
          type: anitya
          project-id: 273
          stable-only: true
          url-template: https://github.com/CGAL/cgal/releases/download/v$version/CGAL-$version.tar.xz

  - name: Eigen3
    buildsystem: cmake-ninja
    builddir: true
    cleanup:
      - '*'
    sources:
      - type: archive
        url: https://gitlab.com/libeigen/eigen/-/archive/5.0.1/eigen-5.0.1.tar.bz2
        sha256: e4de6b08f33fd8b8985d2f204381408c660bffa6170ac65b68ae1bd3cd575c0a
        x-checker-data:
          type: anitya
          project-id: 13751
          stable-only: true
          url-template: https://gitlab.com/libeigen/eigen/-/archive/$version/eigen-$version.tar.bz2

  - name: lib3ds
    buildsystem: autotools
    config-opts:
      - --disable-shared
      - --with-pic
    cleanup:
      - /bin
    sources:
      - type: archive
        url: https://storage.googleapis.com/google-code-archive-downloads/v2/code.google.com/lib3ds/lib3ds-1.3.0.zip
        sha256: f5b00c302955a67fa5fb1f2d3f2583767cdc61fdbc6fd843c0c7c9d95c5629e3
      - type: shell
        commands:
          - autoreconf -vfi

  - name: TBB
    buildsystem: cmake-ninja
    config-opts:
      - -DTBB_TEST=OFF
      - -DTBB_EXAMPLES=OFF
    builddir: true
    sources:
      - type: archive
        url: https://github.com/oneapi-src/oneTBB/archive/refs/tags/v2022.3.0.tar.gz
        sha256: 01598a46c1162c27253a0de0236f520fd8ee8166e9ebb84a4243574f88e6e50a
        x-checker-data:
          type: anitya
          project-id: 8217
          stable-only: true
          url-template: https://github.com/oneapi-src/oneTBB/archive/refs/tags/v$version.tar.gz

  - name: Xerces-C
    buildsystem: cmake-ninja
    cleanup:
      - /bin
    sources:
      - type: archive
        url: https://github.com/apache/xerces-c/archive/refs/tags/v3.3.0.tar.gz
        sha256: 0f28ea2d7a0a3824d326c8bc4be26a3bb01dde289663beb6f15b241f80cbd3ae
      - type: patch
        path: xerces-cpp17.patch

  - name: MeshLab
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE:STRING=Release
    build-options:
      arch:
        aarch64:
          # GLES3/gl32.h declares the same function names that GLEW maps to
          # function-pointer macros, causing "redeclared as different kind of
          # entity" errors. GL_GLES_PROTOTYPES=0 suppresses those prototype
          # declarations in the GLES3 headers.
          cflags: -DGL_GLES_PROTOTYPES=0
          cxxflags: -DGL_GLES_PROTOTYPES=0
          # StructureSynth uses GL 1.x immediate-mode functions (glVertex3f,
          # glNormal3f, etc.) that do not exist in OpenGL ES 3.x, so the
          # filter_ssynth plugin cannot be built on aarch64.
          config-opts:
            - -DMESHLAB_ALLOW_DOWNLOAD_SOURCE_STRUCTURE_SYNTH=OFF
    sources:
      - type: git
        url: https://github.com/cnr-isti-vclab/meshlab.git
        tag: MeshLab-2025.07
        commit: dc48b91ae562756a6988048c5d5c7f1d2b687256
        x-checker-data:
          type: git
          tag-pattern: ^(MeshLab-[\d.]+)$
      - type: git
        url: https://github.com/alemuntoni/meshlab-external-libraries.git
        tag: '2025.07'
        commit: fa745655c9b313506110afc54d8fbfbb51bca5ad
        dest: src/external
      - type: patch
        path: lib3mf-fix-include.patch
        options:
          - -d
          - src/external
      # Fix vcglib include order: GL/gl.h must be included before wrap/gl/math.h
      # so that glMultMatrixf (and other GL 1.x functions) are declared before
      # deprecated_math.h uses them. On aarch64 GLES, Qt's qgl.h does not pull
      # in these declarations, making the existing order a compile error.
      - type: patch
        path: vcglib-view-gl-include-order.patch

  # - name: MeshLab-extra-plugin
  #   buildsystem: cmake-ninja
  #   build-options:
  #     cflags: -fpermissive
  #     cxxflags: -fpermissive
  #   config-opts:
  #     - -DCMAKE_BUILD_TYPE:STRING=Release
  #   sources:
  #     - type: git
  #       url: https://github.com/cnr-isti-vclab/meshlab-extra-plugins.git
  #       commit: c7df060847d7d613b85ec6bcb8a211fee2e77b8d
  #       tag: Meshlab-Extra-Plugins-2023.12
  #       x-checker-data:
  #         type: git
  #         tag-pattern: ^(Meshlab-Extra-Plugins-[\d.]+)$

  - name: MeshLab-appdata
    buildsystem: simple
    build-commands:
      - desktop-file-edit --set-icon=$FLATPAK_ID /app/share/applications/meshlab.desktop
      - install -Dm644 $FLATPAK_ID.appdata.xml /app/share/metainfo/$FLATPAK_ID.appdata.xml
    sources:
      - type: file
        path: net.meshlab.MeshLab.appdata.xml
